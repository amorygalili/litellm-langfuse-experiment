services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm

    ports:
      - "4000:4000"

    env_file:
      - .env

    volumes:
      - ./config.yaml:/app/config.yaml:ro

    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"

    restart: unless-stopped